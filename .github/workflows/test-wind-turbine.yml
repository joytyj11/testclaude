name: Wind Turbine Monitor Tests

on:
  push:
    paths:
      - 'wind_turbine_monitor.py'
      - 'test_wind_turbine.py'
  pull_request:
    paths:
      - 'wind_turbine_monitor.py'
      - 'test_wind_turbine.py'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Run tests
      run: |
        python3 test_wind_turbine.py
    
    - name: Run demo
      run: |
        python3 wind_turbine_monitor.py
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: |
          *.py
          *.log
