<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风力发电机监控仪表板 | UI 团队</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        
        .health-gauge {
            text-align: center;
            padding: 20px;
        }
        
        .health-score {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .health-status {
            font-size: 1rem;
            color: #666;
            margin-top: 10px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .metric-label {
            color: #666;
        }
        
        .metric-value {
            font-weight: bold;
            color: #333;
        }
        
        .warning {
            color: #f39c12;
        }
        
        .critical {
            color: #e74c3c;
        }
        
        .anomaly-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .anomaly-item {
            padding: 8px;
            margin: 5px 0;
            background: #fee;
            border-left: 3px solid #e74c3c;
            font-size: 0.9rem;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .refresh-time {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.8rem;
        }
        
        #chart {
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌬️ 风力发电机健康监测仪表板</h1>
        
        <div class="grid">
            <!-- 健康评分卡片 -->
            <div class="card">
                <h2>健康评分</h2>
                <div class="health-gauge">
                    <div class="health-score" id="healthScore">--</div>
                    <div class="health-status" id="healthStatus">加载中...</div>
                </div>
                <button onclick="refreshData()">🔄 刷新数据</button>
            </div>
            
            <!-- 实时参数卡片 -->
            <div class="card">
                <h2>实时参数</h2>
                <div id="metrics">
                    <div class="metric">
                        <span class="metric-label">风速</span>
                        <span class="metric-value" id="windSpeed">-- m/s</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">功率输出</span>
                        <span class="metric-value" id="powerOutput">-- kW</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">发电机温度</span>
                        <span class="metric-value" id="generatorTemp">-- °C</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">振动</span>
                        <span class="metric-value" id="vibration">-- mm/s</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">噪音水平</span>
                        <span class="metric-value" id="noiseLevel">-- dB</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">状态</span>
                        <span class="metric-value" id="status">--</span>
                    </div>
                </div>
            </div>
            
            <!-- 异常告警卡片 -->
            <div class="card">
                <h2>⚠️ 异常告警</h2>
                <div id="anomalies" class="anomaly-list">
                    <div class="metric">暂无异常</div>
                </div>
            </div>
        </div>
        
        <!-- 历史趋势图表 -->
        <div class="card">
            <h2>📈 健康趋势</h2>
            <div id="chart"></div>
        </div>
        
        <div class="refresh-time" id="refreshTime">
            最后更新: --
        </div>
    </div>
    
    <script>
        let chart = null;
        let historyData = [];
        
        // 初始化图表
        function initChart() {
            const dom = document.getElementById('chart');
            chart = echarts.init(dom);
            chart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: [] },
                yAxis: { type: 'value', name: '健康评分', min: 0, max: 100 },
                series: [{ type: 'line', data: [], smooth: true, lineStyle: { color: '#667eea', width: 2 } }]
            });
        }
        
        // 刷新数据
        async function refreshData() {
            try {
                const response = await fetch('http://localhost:5000/api/current');
                const data = await response.json();
                
                // 更新健康评分
                document.getElementById('healthScore').textContent = data.health_score;
                const statusText = data.health_score >= 80 ? '🟢 良好' : data.health_score >= 60 ? '🟡 警告' : '🔴 紧急';
                document.getElementById('healthStatus').textContent = statusText;
                
                // 更新参数
                document.getElementById('windSpeed').textContent = data.current.wind_speed + ' m/s';
                document.getElementById('powerOutput').textContent = data.current.power_output + ' kW';
                document.getElementById('generatorTemp').textContent = data.current.generator_temp + ' °C';
                document.getElementById('vibration').textContent = data.current.vibration + ' mm/s';
                document.getElementById('noiseLevel').textContent = data.current.noise_level + ' dB';
                
                const statusElem = document.getElementById('status');
                statusElem.textContent = data.status;
                statusElem.className = data.status === 'WARNING' ? 'metric-value warning' : 'metric-value';
                
                // 更新异常列表
                const anomaliesDiv = document.getElementById('anomalies');
                if (data.current.anomalies && data.current.anomalies.length > 0) {
                    anomaliesDiv.innerHTML = data.current.anomalies.map(a => 
                        `<div class="anomaly-item">⚠️ ${a}</div>`
                    ).join('');
                } else {
                    anomaliesDiv.innerHTML = '<div class="metric">✅ 无异常</div>';
                }
                
                // 更新刷新时间
                document.getElementById('refreshTime').textContent = `最后更新: ${new Date().toLocaleTimeString()}`;
                
                // 获取历史数据更新图表
                await loadHistory();
                
            } catch (error) {
                console.error('获取数据失败:', error);
                document.getElementById('healthScore').textContent = 'Error';
                document.getElementById('healthStatus').textContent = '无法连接后端服务';
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('http://localhost:5000/api/history?limit=20');
                const data = await response.json();
                historyData = data.data;
                
                if (chart && historyData.length > 0) {
                    const times = historyData.map(d => new Date(d.timestamp).toLocaleTimeString());
                    const scores = historyData.map(d => d.health_score);
                    chart.setOption({
                        xAxis: { data: times },
                        series: [{ data: scores }]
                    });
                }
            } catch (error) {
                console.error('加载历史数据失败:', error);
            }
        }
        
        // 自动刷新 (每5秒)
        initChart();
        refreshData();
        setInterval(refreshData, 5000);
    </script>
</body>
</html>
